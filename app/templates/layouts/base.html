<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="HawkEye - Intelligent Web Security Assessment Platform">

    <meta
        name="theme-color"
        content="#07090d">

    <title>
        {% block title %}
            HawkEye
        {% endblock %}
    </title>

    <!-- Google Fonts -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Styles -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/variables.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/base.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/layout.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/components.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/animations.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/pages.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/responsive.css') }}">

</head>

<body>

<div class="page-wrapper">

    {% include "components/navbar.html" %}

    <main class="content">

        {% block content %}
        {% endblock %}

    </main>

    {% include "components/footer.html" %}

</div>

<script
    src="{{ url_for('static', filename='js/main.js') }}"
    defer></script>

<script
    src="{{ url_for('static', filename='js/animations.js') }}"
    defer></script>

<script
    src="{{ url_for('static', filename='js/search.js') }}"
    defer></script>

<script
    src="{{ url_for('static', filename='js/utils.js') }}"
    defer></script>

</body>

</html>
<link
    rel="icon"
    type="image/x-icon"
    href="{{ url_for('static', filename='images/favicon.ico') }}">
